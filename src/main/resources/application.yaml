spring:
  application:
    name: yeahpeu-server
  config:
    import:
      - classpath:initialEvents.yml
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 50MB
      enabled: true

  ai:
    openai:
      api-key: ${AI_OPENAI_API_KEY:}

  security:
    oauth2:
      client:
        registration:
          google:
            client-name: google
            client-id: ${SECURITY_OAUTH2_CLIENT_REGISTRATION_GOOGLE_CLIENT_ID:}
            client-secret: ${SECURITY_OAUTH2_CLIENT_REGISTRATION_GOOGLE_CLIENT_SECRET:}
            redirect-uri: ${GOOGLE_REDIRECT_URI:http://localhost:8080/login/oauth2/code/google}
            authorization-grant-type: authorization_code
            scope:
              - email
              - profile

  mail:
    host: smtp.gmail.com
    port: 587
    username: ${GOOGLE_MAIL_USERNAME:}
    password: ${GOOGLE_MAIL_PASSWORD:}
    protocol: smtp
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true

application:
  security:
    jwt:
      secret-key: ${APPLICATION_SECURITY_JWT_SECRET_KEY:}
      access-token-expiration: ${APPLICATION_SECURITY_JWT_ACCESS_TOKEN_EXPIRATION:3600000}
      refresh-token-expiration: ${APPLICATION_SECURITY_JWT_REFRESH_TOKEN_EXPIRATION:86400000}

api:
  naver:
    client-id: ${API_NAVER_CLIENT_ID:}
    client-secret: ${API_NAVER_CLIENT_SECRET:}

app:
  aws:
    s3:
      bucket: ${AWS_BUCKET_NAME:}
    region: ${AWS_REGION:ap-northeast-2}
    access-key: ${AWS_ACCESS_KEY:}
    secret-key: ${AWS_SECRET_KEY:}

logging:
  level:
    org.springframework.messaging.simp: INFO

decorator:
  datasource:
    p6spy:
      enable-logging: false

server:
  forward-headers-strategy: native
